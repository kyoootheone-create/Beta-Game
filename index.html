<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Beta Game</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    -webkit-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

canvas {
    display: block;
}

.ui {
    position: absolute;
    top: 19%;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
}

.logo {
    width: clamp(260px, 60vw, 520px);
    image-rendering: pixelated;
    margin-bottom: 5vh;
    margin-top: 6vh;
}

.buttons {
    margin-top: -30px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.btn-img {
    width: clamp(130px, 26vw, 220px);
    margin: 0 -6px;
    image-rendering: pixelated;
    cursor: pointer;
    transition: transform 0.05s steps(1);
}

.or-img {
    width: clamp(40px, 8vw, 70px);
    margin: 0 -8px;
    image-rendering: pixelated;
    pointer-events: none;
}

img {
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-drag: none;
}

.btn-img:hover {
    transform: scale(0.95);
}

.btn-img:active {
    transform: scale(0.80);
}
</style>
</head>
<body>

<script>
const link_logo = "https://i.postimg.cc/15sYPxhB/file-00000000a9ec71fdb5efe90691e0f30f.png";
const link_juega = "https://i.imgur.com/XLBDawl.png";
const link_o = "https://i.imgur.com/NhNdP0V.png";
const link_muere = "https://i.imgur.com/AlAGZkr.png";
</script>

<div class="ui">
    <img id="logo" class="logo" draggable="false">
    <div class="buttons">
        <img id="juega" class="btn-img" draggable="false">
        <img id="o" class="or-img" draggable="false">
        <img id="muere" class="btn-img" draggable="false">
    </div>
</div>

<canvas id="bg"></canvas>

<script>
document.getElementById("logo").src = link_logo;
document.getElementById("juega").src = link_juega;
document.getElementById("o").src = link_o;
document.getElementById("muere").src = link_muere;

document.addEventListener("contextmenu", e => e.preventDefault());

document.querySelectorAll("img").forEach(img => {
    img.addEventListener("dragstart", e => e.preventDefault());
});

document.querySelectorAll(".btn-img").forEach(btn => {
    btn.addEventListener("click", () => {
        btn.style.transform = "scale(0.80)";
        setTimeout(() => btn.style.transform = "scale(0.95)", 120);
        setTimeout(() => btn.style.transform = "", 260);
        setTimeout(() => console.log(btn.id), 260);
    });

    btn.addEventListener("mouseleave", () => {
        btn.style.transform = "";
    });
});

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    draw();
}

function draw() {
    const pixelSize = 17;

    for (let y = 0; y < canvas.height; y += pixelSize) {
        for (let x = 0; x < canvas.width; x += pixelSize) {

            let gradient = 1 - (y / canvas.height);
            let noise = Math.random() * 0.3;

            let blue = Math.floor(100 + 155 * gradient + noise * 100);
            let green = Math.floor(20 + noise * 30);
            let red = Math.floor(noise * 20);

            ctx.fillStyle = `rgb(${red}, ${green}, ${blue})`;
            ctx.fillRect(x, y, pixelSize, pixelSize);
        }
    }
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();
</script>

}

</body>
</html>
